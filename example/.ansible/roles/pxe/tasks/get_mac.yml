# --- ШАГ 1: ОПРЕДЕЛЯЕМ ТИП ТРАНСПОРТА ---
- name: Анализ идентификатора подключения
  set_fact:
    connection_type: "{% if adb_identify | regex_search('^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+') %}wifi{% else %}usb{% endif %}"

- name: Лог типа подключения
  debug:
    msg: "Работаем через {{ connection_type | upper }} (ID: {{ adb_identify }})"

# --- ШАГ 2: ПОЛУЧЕНИЕ MAC (ADB ВЕРСИЯ) ---
- name: Попытка получить MAC через ADB
  shell: "adb -s {{ adb_identify }} shell ip link show wlan0 | grep ether | awk '{print $2}'"
  register: mac_adb
  ignore_errors: yes
  delegate_to: localhost
  # Считаем задачу проваленной, если stdout пустой или в stderr есть фраза "not found"
  failed_when: >
    mac_adb.stdout == "" or 
    "not found" in mac_adb.stderr

# --- ШАГ 3: ФОЛБЭК НА TERMUX (ЕСЛИ ADB УПАЛ) ---
- name: Получение MAC локально в Termux (если ADB недоступен)
  shell: "ip link show wlan0 | grep ether | awk '{print $2}'"
  register: mac_termux
  when: mac_adb is failed
  ignore_errors: yes

# --- ШАГ 4: ВЫБОР ИТОГОВОГО MAC ---
- name: Выбор валидного MAC-адреса
  set_fact:
    # Добавили | trim к каждому выводу, чтобы сразу отсечь пробелы и переносы
    final_mac: >-
      {% if mac_adb is success and mac_adb.stdout != "" %}
        {{ mac_adb.stdout | trim }}
      {% elif mac_termux is defined and mac_termux is success and mac_termux.stdout != "" %}
        {{ mac_termux.stdout | trim }}
      {% else %}
        unknown
      {% endif %}

- name: Указываем пути к файлам Vault
  set_fact:
    vault_file: "/etc/ansible/group_vars/all/vault.yml"

# --- ШАГ 5: ЗАПИСЬ В ЗАШИФРОВАННЫЙ VAULT ---
- name: Сохранение MAC в зашифрованный vault.yml
  shell: |
    # 1. Проверяем, зашифрован ли файл. Если да — расшифровываем
    if head -n 1 {{ vault_file }} | grep -q "\$ANSIBLE_VAULT"; then
        ansible-vault decrypt {{ vault_file }}
    fi
    
    # 2. Удаляем старую запись pxe_mac, если она там была (чтобы не дублировать)
    sed -i '/^pxe_mac:/d' {{ vault_file }}
    
    # 3. Добавляем новый MAC (обязательно в кавычках и с trim)
    echo 'pxe_mac: "{{ final_mac | trim }}"' >> {{ vault_file }}
    
    # 4. Зашифровываем обратно
    ansible-vault encrypt {{ vault_file }}
  delegate_to: localhost
  when: final_mac != 'unknown'

- name: Статус завершения
  debug:
    msg: "MAC {{ final_mac | trim }} успешно добавлен и зашифрован в {{ vault_file }}"