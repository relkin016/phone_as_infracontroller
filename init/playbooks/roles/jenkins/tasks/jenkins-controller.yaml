# init/playbooks/roles/jenkins/tasks/jenkins-controller.yaml
- name: Install OpenJDK
  ansible.builtin.command: "{{ termux_bin }}/pkg install -y {{ openjdk_package_name }}"
  register: java_install_result
  changed_when: "'Setting up' in java_install_result.stdout"

- name: Install font packages for Jenkins
  ansible.builtin.command: "{{ termux_bin }}/pkg install -y fontconfig freetype ttf-dejavu"
  register: font_install_result
  changed_when: "'Setting up' in font_install_result.stdout"

- name: Verify Java installation
  ansible.builtin.command: "{{ java_bin }} -version"
  register: java_version_check
  changed_when: false

- name: Display Java version
  ansible.builtin.debug:
    msg: "Java installed: {{ java_version_check.stderr.split('\n')[0] }}"

- name: Create Jenkins home directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ jenkins_home }}"
    - "{{ jenkins_log_dir }}"
    - "{{ jenkins_plugins_dir }}"
    - "{{ jenkins_jobs_dir }}"
    - "{{ jenkins_home }}/init.groovy.d"

- name: Check if Jenkins WAR exists
  ansible.builtin.stat:
    path: "{{ jenkins_war_path }}"
  register: jenkins_war_stat

- name: Download Jenkins WAR file
  ansible.builtin.get_url:
    url: "{{ jenkins_war_url }}"
    dest: "{{ jenkins_war_path }}"
    mode: "0644"
  when: not jenkins_war_stat.stat.exists
  register: jenkins_download

- name: Create UpgradeWizard state file to skip setup wizard
  ansible.builtin.copy:
    dest: "{{ jenkins_home }}/jenkins.install.UpgradeWizard.state"
    content: "{{ jenkins_version }}"
    mode: "0644"
  when: skip_setup_wizard | bool

- name: Create InstallUtil state file to mark installation complete
  ansible.builtin.copy:
    dest: "{{ jenkins_home }}/jenkins.install.InstallUtil.lastExecVersion"
    content: "{{ jenkins_version }}"
    mode: "0644"
  when: skip_setup_wizard | bool

- name: Create admin user with known password for automation
  ansible.builtin.copy:
    dest: "{{ jenkins_home }}/init.groovy.d/create-admin.groovy"
    content: |
      import jenkins.model.Jenkins
      import hudson.security.HudsonPrivateSecurityRealm
      import hudson.security.FullControlOnceLoggedInAuthorizationStrategy

      def instance = Jenkins.getInstance()

      // Create security realm if not exists
      def hudsonRealm = new HudsonPrivateSecurityRealm(false)

      // Create admin user with known password
      def adminUsername = "{{ jenkins_admin_user }}"
      def adminPassword = "{{ jenkins_admin_password }}"

      // Only create if user doesn't exist
      if (hudsonRealm.getUser(adminUsername) == null) {
        hudsonRealm.createAccount(adminUsername, adminPassword)
        instance.setSecurityRealm(hudsonRealm)

        // Set authorization strategy
        def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
        strategy.setAllowAnonymousRead(false)
        instance.setAuthorizationStrategy(strategy)

        instance.save()
        println("Admin user created: ${adminUsername}")
      }
    mode: "0644"

- name: Create Jenkins startup script
  ansible.builtin.template:
    src: start-jenkins.sh.j2
    dest: "{{ jenkins_service_script }}"
    mode: "0755"

- name: Create Jenkins service directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ termux_home }}/.termux/sv/{{ jenkins_service_name }}"
    - "{{ termux_home }}/.termux/sv/{{ jenkins_service_name }}/log"
  when: jenkins_service_enabled | bool

- name: Create Jenkins service run script
  ansible.builtin.template:
    src: jenkins-run.sh.j2
    dest: "{{ termux_home }}/.termux/sv/{{ jenkins_service_name }}/run"
    mode: "0755"
  when: jenkins_service_enabled | bool

- name: Create Jenkins service log/run script
  ansible.builtin.template:
    src: jenkins-log-run.sh.j2
    dest: "{{ termux_home }}/.termux/sv/{{ jenkins_service_name }}/log/run"
    mode: "0755"
  when: jenkins_service_enabled | bool

- name: Ensure service directory exists
  ansible.builtin.file:
    path: "{{ termux_usr }}/var/service"
    state: directory
    mode: "0755"
  when: jenkins_service_enabled | bool

- name: Enable Jenkins service (create symlink)
  ansible.builtin.file:
    src: "{{ termux_home }}/.termux/sv/{{ jenkins_service_name }}"
    dest: "{{ termux_usr }}/var/service/{{ jenkins_service_name }}"
    state: link
  when: jenkins_service_enabled | bool
  register: jenkins_service_enabled_result

- name: Check if runsvdir is running
  ansible.builtin.shell: pgrep -f runsvdir
  register: runsvdir_check
  changed_when: false
  failed_when: false
  when: jenkins_service_enabled | bool

- name: Start runsvdir if not running
  ansible.builtin.shell: |
    nohup {{ termux_usr }}/bin/runsvdir {{ termux_usr }}/var/service > /dev/null 2>&1 &
    sleep 2
  when:
    - jenkins_service_enabled | bool
    - runsvdir_check.rc != 0
  register: runsvdir_start

- name: Wait for runsvdir to initialize service
  ansible.builtin.pause:
    seconds: 3
  when:
    - jenkins_service_enabled | bool
    - runsvdir_check.rc != 0

- name: Start Jenkins service
  ansible.builtin.command: sv up {{ termux_usr }}/var/service/{{ jenkins_service_name }}
  when: jenkins_service_enabled | bool
  register: jenkins_start
  changed_when: "'run:' in jenkins_start.stdout or 'ok:' in jenkins_start.stdout"
  failed_when: false

- name: Wait for Jenkins to start
  ansible.builtin.uri:
    url: "http://localhost:{{ jenkins_port }}"
    status_code: [200, 403]
    timeout: 5
  register: jenkins_check
  until: jenkins_check.status in [200, 403]
  retries: "{{ jenkins_wait_timeout // jenkins_wait_delay }}"
  delay: "{{ jenkins_wait_delay }}"
  ignore_errors: true

- name: Get initial admin password
  ansible.builtin.slurp:
    src: "{{ jenkins_home }}/secrets/initialAdminPassword"
  register: initial_password
  ignore_errors: true

- name: Display Jenkins access information
  ansible.builtin.debug:
    msg:
      - "Jenkins controller installation complete!"
      - "Jenkins URL: http://{{ ansible_host }}:{{ jenkins_port }}"
      - "Initial admin password: {{ initial_password.content | b64decode | trim if initial_password is succeeded else 'Check ' + jenkins_home + '/secrets/initialAdminPassword' }}"
      - "Java version: {{ java_version_check.stderr.split('\n')[0] }}"
      - "Jenkins WAR: {{ jenkins_war_path }}"
      - "Jenkins home: {{ jenkins_home }}"
