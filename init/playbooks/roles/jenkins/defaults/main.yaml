---
# ==========================================
# 1. TERMUX ОСНОВНІ НАЛАШТУВАННЯ (termux-base)
# ==========================================
# Шляхи Termux
termux_prefix: /data/data/com.termux/files
termux_home: "{{ termux_prefix }}/home"
termux_usr: "{{ termux_prefix }}/usr"
termux_bin: "{{ termux_usr }}/bin"

# Керування пакетами та сховищем
setup_storage: true
update_packages: true
upgrade_packages: true

termux_base_packages:
  - openssh
  - git
  - curl
  - wget
  - tar
  - gzip
  - unzip
  - nano
  - vim
  - htop
  - ncurses-utils
  - termux-services
  - termux-tools
  - termux-api

termux_directories:
  - "{{ termux_home }}/.ssh"
  - "{{ termux_home }}/bin"
  - "{{ termux_home }}/workspace"
  - "{{ termux_home }}/logs"

# ==========================================
# 2. НАЛАШТУВАННЯ SSH (termux-base)
# ==========================================
ssh_port: 8022
enable_sshd: true
start_sshd: true

ssh_permit_root_login: "no"
ssh_password_authentication: "yes"  # Зміниться на no після налаштування ключів
ssh_pubkey_authentication: "yes"
ssh_allow_users: ""  # Порожньо = дозволено всім

# Налаштування ключів
setup_ssh_keys: true
ssh_key_type: ed25519
ssh_key_comment: "ansible-managed-{{ ansible_hostname }}"

ssh_directory_mode: "0700"
ssh_key_mode: "0600"
ssh_authorized_keys_mode: "0600"

# ==========================================
# 3. НАЛАШТУВАННЯ JAVA
# ==========================================
java_home: "{{ termux_usr }}"
openjdk_package_name: "openjdk-21"
jdk_tool_name: "OpenJDK-21"

# ==========================================
# 4. JENKINS CONTROLLER (jenkins-controller)
# ==========================================
jenkins_war_url: "https://get.jenkins.io/war-stable/{{ jenkins_version }}/jenkins.war"
jenkins_war_path: "{{ jenkins_war }}"  # jenkins_war має бути визначено в group_vars

jenkins_log_dir: "{{ jenkins_home }}/logs"
jenkins_plugins_dir: "{{ jenkins_home }}/plugins"
jenkins_jobs_dir: "{{ jenkins_home }}/jobs"

jenkins_http_listen_address: "0.0.0.0"
jenkins_java_options: "-Djava.awt.headless=true -Xmx512m -Xms256m"
jenkins_args: "--httpPort={{ jenkins_port }} --httpListenAddress={{ jenkins_http_listen_address }}"

jenkins_admin_email: "admin@localhost"
jenkins_admin_user: "admin"
jenkins_admin_password: "admin"

jenkins_service_enabled: true
jenkins_service_name: "jenkins"
jenkins_service_script: "{{ termux_home }}/bin/start-jenkins.sh"

skip_setup_wizard: true
jenkins_wait_timeout: 300
jenkins_wait_delay: 10

# ==========================================
# 5. JENKINS JCASC ТА ПЛАГІНИ (jenkins-jcasc)
# ==========================================
# Управління конфігурацією JCasC
jcasc_config_source: jenkins.yaml
jcasc_config_dest: "{{ jenkins_home }}/jenkins.yaml"
jcasc_reload_token: "{{ lookup('env', 'JCASC_RELOAD_TOKEN') | default('changeme-' + ansible_date_time.epoch, true) }}"

# Управління плагінами
install_plugins: true
install_plugins_from_file: true
plugins_file: "{{ playbook_dir }}/../jcasc/plugins.txt"
plugins_file_source: plugins.txt
plugins_file_dest: "{{ jenkins_home }}/plugins.txt"
plugin_manager_version: "2.13.0"

# Робота з конфігурацією та джобами
reload_jcasc: true
verify_config: true
config_wait_timeout: 60
config_wait_delay: 5

deploy_sample_jobs: true
jobs_source_dir: jobs

jenkins_cli_jar: "{{ jenkins_home }}/jenkins-cli.jar"
jenkins_cli_url: "http://localhost:{{ jenkins_port }}/jnlpJars/jenkins-cli.jar"

# ==========================================
# 6. JENKINS AGENT (jenkins-agent)
# ==========================================
jenkins_agent_name: "termux-agent-1"
jenkins_agent_home: "{{ termux_home }}/jenkins-agent"
jenkins_agent_user: "{{ ansible_user | default('termux') }}"
jenkins_agent_labels: "android termux mobile"
jenkins_agent_executors: 2
jenkins_agent_memory_limit: "1024m"

# SSH ключі для агента
jenkins_agent_ssh_key_path: "{{ jenkins_home }}/ssh"
jenkins_agent_ssh_key_type: "ed25519"
jenkins_agent_ssh_key_name: "id_ed25519"

# Структура директорій агента
jenkins_agent_workspace: "{{ jenkins_agent_home }}/workspace"
jenkins_agent_tools: "{{ jenkins_agent_home }}/tools"
jenkins_agent_cache: "{{ jenkins_agent_home }}/cache"

jenkins_agent_directories:
  - "{{ jenkins_agent_home }}"
  - "{{ jenkins_agent_workspace }}"
  - "{{ jenkins_agent_tools }}"
  - "{{ jenkins_agent_cache }}"
  - "{{ jenkins_agent_ssh_key_path }}"

jenkins_agent_env_vars:
  - { name: "ANDROID_BUILD", value: "true" }
  - { name: "TERMUX_BUILD", value: "true" }

verify_agent_setup: true

# JCasC аліаси для агента (спрощено)
agent_name: "{{ jenkins_agent_name }}"
agent_home: "{{ jenkins_agent_home }}"
agent_labels: "{{ jenkins_agent_labels }}"
agent_ssh_key: "{{ jenkins_agent_ssh_key_path }}/{{ jenkins_agent_ssh_key_name }}"