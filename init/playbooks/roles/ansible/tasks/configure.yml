# init/playbooks/roles/ansible/tasks/copy.yml
- name: Ensure ansible group_vars directory exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_dir }}"
    - "{{ ansible_dir }}/group_vars/all"
    - "{{ ansible_dir }}/group_vars/termux"

- name: Copy ansible vault file
  ansible.builtin.copy:
    src: "{{ lookup('env', 'HOME') }}/ansible/group_vars/all/vault.yaml"
    dest: "{{ termux_home }}/ansible/group_vars/all/vault.yaml"

- name: Copy ansible vault_pass file
  ansible.builtin.copy:
    src: "{{ lookup('env', 'HOME') }}/ansible/.vault_pass"
    dest: "{{ termux_home }}/ansible/.vault_pass"

- name: Згенерувати ansible.cfg
  ini_file:
    path: "{{ ansible_dir }}/ansible.cfg"
    mode: '0644'
    section: "{{ item.section }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
  loop:
    - { section: defaults, option: host_key_checking,   value: "False" }
    - { section: defaults, option: vault_password_file, value: "{{ ansible_dir }}/.vault_pass" }
    - { section: defaults, option: inventory,           value: "{{ ansible_dir }}/hosts.yaml" }
    - { section: defaults, option: roles_path,          value: "{{ roles_path }}" }
    - { section: ssh_connection, option: ssh_args,      value: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" }
    - { section: ssh_connection, option: pipelining,    value: "True" }
