# init/playbooks/roles/termux-base/tasks/boot.yml

- name: Ensure ~/.termux/boot directory exists
  ansible.builtin.file:
    path: "{{ termux_home }}/.termux/boot"
    state: directory
    mode: '0755'

- name: Create sshd autostart script for Termux Boot
  ansible.builtin.copy:
    dest: "{{ termux_home }}/.termux/boot/start-sshd.sh"
    content: |
      #!/data/data/com.termux/files/usr/bin/bash
      termux-wake-lock
      sshd
    mode: '0755'