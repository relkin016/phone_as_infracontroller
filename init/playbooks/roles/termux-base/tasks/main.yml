# init/playbooks/roles/termux-base/tasks/main.yml
- name: Ensure ~/.termux/boot directory exists
  ansible.builtin.file:
    path: "{{ termux_home }}/.termux/boot"
    state: directory
    mode: '0755'

- name: Create sshd autostart script for Termux Boot
  ansible.builtin.shell: |
    cat > {{ termux_home }}/.termux/boot/start-sshd.sh << 'EOF'
    #!/data/data/com.termux/files/usr/bin/bash
    sshd
    EOF
    chmod 0755 {{ termux_home }}/.termux/boot/start-sshd.sh
  args:
    executable: /data/data/com.termux/files/usr/bin/bash
    creates: "{{ termux_home }}/.termux/boot/start-sshd.sh"
