---
# playbooks/pxe-deploy.yml
# Запускається всередині Jenkins job "pxe-deploy" на телефоні
# Піднімає tftpd + nginx, чекає завершення встановлення

- name: Запуск PXE сервера на телефоні
  hosts: localhost
  gather_facts: false

  vars:
    termux_home: /data/data/com.termux/files/home
    termux_prefix: /data/data/com.termux/files/usr
    tftp_root: "{{ termux_home }}/tftp"
    tftp_port: 6969
    http_port: 9080   # окремий порт щоб не конфліктувати з Jenkins :8080
    phone_ip: "{{ lookup('pipe', 'ip route get 1 | awk \\'{ print $7; exit }\\'') }}"

  tasks:

    # ── 1. Запустити tftpd ────────────────────────────────────────────────────
    - name: Зупинити старий tftpd якщо є
      ansible.builtin.shell: pkill -f 'tftpd' || true

    - name: Запустити tftpd
      ansible.builtin.shell: |
        tftpd -l -s {{ tftp_root }} -a 0.0.0.0:{{ tftp_port }} \
          >> {{ termux_home }}/logs/tftpd.log 2>&1 &
        echo $!
      register: tftpd_pid

    - name: Перевірити що tftpd слухає
      ansible.builtin.shell: |
        sleep 2
        ss -ulnp | grep :{{ tftp_port }}
      register: tftpd_check
      failed_when: tftpd_check.rc != 0

    # ── 2. Запустити nginx ────────────────────────────────────────────────────
    - name: Зупинити старий nginx якщо є
      ansible.builtin.shell: pkill -f nginx || true

    - name: Оновити nginx.conf з актуальним http_port
      ansible.builtin.template:
        src: "{{ termux_home }}/templates/nginx.conf.j2"
        dest: "{{ termux_prefix }}/etc/nginx/nginx.conf"
      ignore_errors: yes   # шаблон вже розкладено раніше

    - name: Запустити nginx
      ansible.builtin.shell: |
        nginx >> {{ termux_home }}/logs/nginx.log 2>&1
      register: nginx_start
      failed_when: nginx_start.rc != 0

    # ── 3. Зберегти IP ПК для Jenkinsfile (wait stage) ───────────────────────
    - name: Визначити IP ПК з змінної PC_MAC
      ansible.builtin.shell: |
        # PC_MAC передається з Jenkins як env змінна
        echo "${PC_MAC:-unknown}"
      register: pc_mac_val
      environment:
        PC_MAC: "{{ lookup('env', 'PC_MAC') }}"

    - name: Показати що запущено
      ansible.builtin.debug:
        msg:
          - "tftpd: 0.0.0.0:{{ tftp_port }}"
          - "nginx: 0.0.0.0:{{ http_port }}"
          - "phone_ip: {{ phone_ip }}"
          - "PC_MAC: {{ pc_mac_val.stdout }}"
